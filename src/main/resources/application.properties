spring.application.name=planora-backend

# Database config (pick one):
# 1) Env: DB_URL, DB_USER, DB_PASSWORD
# 2) Copy src/main/resources/application-local.properties -> application-local.properties (gitignored; works from any IDE working directory)
# 3) File next to pom.xml: ./application-local.properties
# If none of these set a real URL, defaults below hit localhost — "connection refused" means Postgres is not running locally.
spring.config.import=optional:classpath:application-local.properties,optional:file:./application-local.properties

# PostgreSQL URL must include // after postgresql:  →  jdbc:postgresql://HOST:5432/DB?sslmode=require
spring.datasource.url=jdbc:postgresql://ep-winter-resonance-a1d8inid-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_2qaopn1WRDmK

# No Flyway — Hibernate creates/updates tables from entities (dev-friendly)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Avoid "Unable to determine Dialect without JDBC metadata" when the driver cannot reach DB at init
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

planora.cors.allowed-origins=http://localhost:5173

# Server-side AI keys (optional — parse endpoint returns 503 if missing for chosen provider)
planora.ai.openai.api-key=${OPENAI_API_KEY:}
planora.ai.gemini.api-key=AIzaSyBHcFzMiNfro6RL54iRyRXXXX2d3lyU2H4sD0cXXXXXXX

server.port=8080

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
