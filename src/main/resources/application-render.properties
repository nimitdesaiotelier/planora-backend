# Active when SPRING_PROFILES_ACTIVE=render (set in Render dashboard).
# Overrides base application.properties for that environment only.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

planora.cors.allowed-origins=${PLANORA_CORS_ALLOWED_ORIGINS}

planora.ai.openai.api-key=${OPENAI_API_KEY:}
planora.ai.gemini.api-key=${GEMINI_API_KEY:}

server.port=${PORT:8080}
